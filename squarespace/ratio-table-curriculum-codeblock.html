<!-- ============================================================
     WCCC "Student-to-teacher ratios" table — Squarespace CODE BLOCK
     Add a "Code" block to the CURRICULUM page and paste ALL of this.
     ============================================================ -->
<style>
.wccc-ratios{
  --ink:#1F2933; --teal:#0A5749; --line:#E6DED0; --sand:#F3ECDF; --mute:#5B6770;
  font-family:'Nunito Sans',-apple-system,'Segoe UI',Roboto,sans-serif;
  max-width:560px; margin:0 auto; color:var(--ink);
}
.wccc-ratios .scroll{ overflow-x:auto; border:1px solid var(--line); border-radius:16px; }
.wccc-ratios table{ border-collapse:collapse; width:100%; min-width:420px; background:#fff; border:0; }
.wccc-ratios th,.wccc-ratios td{ padding:.85rem 1.1rem; text-align:left; border:0; border-bottom:1px solid var(--line); background:transparent; color:var(--ink); font-family:inherit; }
.wccc-ratios thead th{ background:var(--sand); color:var(--ink); font-size:.78rem; letter-spacing:.05em; text-transform:uppercase; font-weight:800; }
.wccc-ratios tbody th{ font-weight:800; color:var(--ink); }
.wccc-ratios tbody tr:last-child th,.wccc-ratios tbody tr:last-child td{ border-bottom:0; }
.wccc-ratios td.r{ font-weight:800; color:var(--teal); white-space:nowrap; }
.wccc-ratios .dot{ display:inline-block; width:.7rem; height:.7rem; border-radius:50%; margin-right:.5rem; vertical-align:middle; }
</style>

<div class="wccc-ratios">
  <div class="scroll">
    <table>
      <thead>
        <tr><th scope="col">Classroom</th><th scope="col">Stage</th><th scope="col">Ratio</th></tr>
      </thead>
      <tbody>
        <tr><th scope="row"><span class="dot" style="background:#38A8DF"></span>Cloud</th><td>Infants</td><td class="r">1 : 3</td></tr>
        <tr><th scope="row"><span class="dot" style="background:#F4C41F"></span>Sunshine</th><td>Toddlers</td><td class="r">1 : 4</td></tr>
        <tr><th scope="row"><span class="dot" style="background:#F0663F"></span>Rainbow</th><td>Young Preschool</td><td class="r">1 : 5</td></tr>
        <tr><th scope="row"><span class="dot" style="background:#2BB6A3"></span>Star</th><td>Preschool</td><td class="r">1 : 7</td></tr>
        <tr><th scope="row"><span class="dot" style="background:#7A4EA3"></span>Rocket</th><td>Pre-Kindergarten</td><td class="r">1 : 9</td></tr>
      </tbody>
    </table>
  </div>
</div>
