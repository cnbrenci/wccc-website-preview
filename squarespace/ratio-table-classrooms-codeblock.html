<!-- ============================================================
     WCCC "Ages, sizes & ratios" table — Squarespace CODE BLOCK
     Add a "Code" block to the CLASSROOMS page and paste ALL of this.
     To edit: change the numbers in the rows. The colored dot before
     each room is set inline (style="background:#RRGGBB").
     ============================================================ -->
<style>
.wccc-ratios{
  --ink:#1F2933; --teal:#0A5749; --line:#E6DED0; --sand:#F3ECDF; --mute:#5B6770;
  font-family:'Nunito Sans',-apple-system,'Segoe UI',Roboto,sans-serif;
  max-width:720px; margin:0 auto; color:var(--ink);
}
.wccc-ratios .scroll{ overflow-x:auto; border:1px solid var(--line); border-radius:16px; }
.wccc-ratios table{ border-collapse:collapse; width:100%; min-width:480px; background:#fff; border:0; }
.wccc-ratios th,.wccc-ratios td{ padding:.85rem 1.1rem; text-align:left; border:0; border-bottom:1px solid var(--line); background:transparent; color:var(--ink); font-family:inherit; }
.wccc-ratios thead th{ background:var(--sand); color:var(--ink); font-size:.78rem; letter-spacing:.05em; text-transform:uppercase; font-weight:800; }
.wccc-ratios tbody th{ font-weight:800; color:var(--ink); }
.wccc-ratios tbody tr:last-child th,.wccc-ratios tbody tr:last-child td{ border-bottom:0; }
.wccc-ratios td.r{ font-weight:800; color:var(--teal); white-space:nowrap; }
.wccc-ratios .dot{ display:inline-block; width:.7rem; height:.7rem; border-radius:50%; margin-right:.5rem; vertical-align:middle; }
.wccc-ratios .note{ margin-top:1rem; color:var(--mute); font-size:.92rem; }
</style>

<div class="wccc-ratios">
  <div class="scroll">
    <table>
      <thead>
        <tr><th scope="col">Room</th><th scope="col">Ages</th><th scope="col">Children</th><th scope="col">Ratio</th></tr>
      </thead>
      <tbody>
        <tr><th scope="row"><span class="dot" style="background:#38A8DF"></span>Cloud</th><td>2–14 months</td><td>6</td><td class="r">1 : 3</td></tr>
        <tr><th scope="row"><span class="dot" style="background:#F4C41F"></span>Sunshine</th><td>1–2 years</td><td>8</td><td class="r">1 : 4</td></tr>
        <tr><th scope="row"><span class="dot" style="background:#F0663F"></span>Rainbow</th><td>1.5–2.5 years</td><td>10</td><td class="r">1 : 5</td></tr>
        <tr><th scope="row"><span class="dot" style="background:#2BB6A3"></span>Star</th><td>2.5–3.5 years</td><td>14</td><td class="r">1 : 7</td></tr>
        <tr><th scope="row"><span class="dot" style="background:#7A4EA3"></span>Rocket</th><td>3.5–5 years</td><td>17</td><td class="r">1 : 9</td></tr>
      </tbody>
    </table>
  </div>
  <p class="note">WCCC is licensed for 58 children, 8 weeks to 5 years of age.</p>
</div>
